  json_annotation: ^4.9.0
  http: ^1.2.2
  meta: ^1.11.0
  stellar_flutter_sdk: ^1.9.0

dev_dependencies:
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  lints: ^4.0.0
  test: ^1.25.0
